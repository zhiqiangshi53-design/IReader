name: 编译 IReader 无签名 IPA
on:
  workflow_dispatch: # 手动触发编译

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取代码（含子模块）
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: 打印完整目录结构（关键调试步骤）
        run: |
          echo "=== 项目根目录结构 ==="
          ls -la
          # 遍历所有子目录，找到 iOS 相关文件夹
          find . -type d -name "*ios*" -o -type d -name "*iOS*" | head -20
          echo "=== 找到的 iOS 子目录内容 ==="
          # 遍历找到的 iOS 子目录，打印其下的文件
          for dir in $(find . -type d -name "*ios*" -o -type d -name "*iOS*"); do
            echo "目录: $dir"
            ls -la "$dir"
          done

      - name: 临时跳过编译（先看日志）
        run: echo "已跳过编译，等待根据日志调整脚本"
