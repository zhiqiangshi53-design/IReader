name: 编译 IReader IPA
on:
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 直接编译，跳过所有错误脚本、Gradle、KMP依赖
      - name: 编译iOS应用
        run: |
          cd iosApp
          xcodebuild build \
          -project iosApp.xcodeproj \
          -scheme iosApp \
          -configuration Release \
          -destination 'generic/platform=ios' \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          SKIP_SCRIPT_CHECKS=YES \
          SKIP_BUILD_SCRIPT_PHASE=YES

      # 打包IPA
      - name: 打包IPA
        run: |
          mkdir -p Payload
          cp -r iosApp/build/Release-iphoneos/iosApp.app Payload/
          zip -r IReader.ipa Payload/

      # 上传
      - uses: actions/upload-artifact@v4
        with:
          name: IReader-IPA
          path: IReader.ipa
