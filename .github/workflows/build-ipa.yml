name: 编译 IReader 无签名 IPA
on:
  workflow_dispatch: # 手动触发编译

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取代码（含子模块）
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: 安装 iOS 依赖
        run: |
          sudo gem install cocoapods
          pod install

      - name: 编译无签名 IPA
        run: |
          xcodebuild -workspace IReader.xcworkspace \
          -scheme IReader \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          clean build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO

      - name: 打包为 TrollStore 兼容格式
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/IReader.app Payload/
          zip -r IReader_Troll.ipa Payload/

      - name: 上传 IPA 供下载
        uses: actions/upload-artifact@v4
        with:
          name: IReader-iOS-IPA
          path: IReader_Troll.ipa
