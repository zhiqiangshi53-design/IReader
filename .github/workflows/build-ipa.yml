name: 编译 IReader 无签名 IPA
on:
  workflow_dispatch: # 手动触发编译

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取代码（含子模块）
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: 安装依赖 & 编译（全程在 iosApp/iosApp 目录下）
        run: |
          sudo gem install cocoapods
          # 全程锁定在 iosApp/iosApp 目录
          cd iosApp/iosApp
          
          # 1. 安装依赖，生成 .xcworkspace
          pod install --repo-update
          
          # 2. 用 workspace 编译无签名 IPA
          xcodebuild -workspace iosApp.xcworkspace \
          -scheme "iosApp" \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          clean build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO

      - name: 打包为 TrollStore 格式
        run: |
          # 回到根目录，打包产物
          cd ../..
          BUILD_DIR="iosApp/iosApp/build/Release-iphoneos"
          mkdir -p Payload
          cp -r $BUILD_DIR/iosApp.app Payload/
          zip -r IReader_Troll.ipa Payload/

      - name: 上传 IPA 供下载
        uses: actions/upload-artifact@v4
        with:
          name: IReader-Troll-IPA
          path: IReader_Troll.ipa
