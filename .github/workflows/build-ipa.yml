name: 编译 IReader 无签名 IPA
on:
  workflow_dispatch: # 手动触发编译

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取代码（含子模块）
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: 安装 iOS 依赖（进入真实 iosApp 目录）
        run: |
          sudo gem install cocoapods
          # 进入真实的 iOS 工程目录
          cd iosApp/iosApp
          # 安装依赖（存在 Podfile）
          pod install --repo-update

      - name: 编译无签名 IPA（使用真实项目文件和 Scheme）
        run: |
          # 进入 iOS 工程目录执行编译
          cd iosApp/iosApp
          xcodebuild -project iosApp.xcodeproj \
          -scheme "iosApp" \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          clean build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO

      - name: 打包为 TrollStore 格式
        run: |
          # 定义编译产物路径
          BUILD_DIR="iosApp/iosApp/build/Release-iphoneos"
          # 打包
          mkdir -p Payload
          cp -r $BUILD_DIR/iosApp.app Payload/
          zip -r IReader_Troll.ipa Payload/

      - name: 上传 IPA 供下载
        uses: actions/upload-artifact@v4
        with:
          name: IReader-Troll-IPA
          path: IReader_Troll.ipa
