name: 编译 IReader 无签名 IPA
on:
  workflow_dispatch: # 手动触发编译

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取代码（含子模块）
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: 编译无签名 IPA（进入正确目录 iosApp）
        run: |
          sudo gem install cocoapods
          # 进入正确的 iOS 工程目录：iosApp（不是 iosApp/iosApp）
          cd iosApp
          # 确认当前目录下的文件
          ls -la
          # 用 .xcodeproj 编译
          xcodebuild -project iosApp.xcodeproj \
          -scheme "iosApp" \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          clean build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO

      - name: 打包为 TrollStore 格式
        run: |
          # 回到根目录
          cd ..
          BUILD_DIR="iosApp/build/Release-iphoneos"
          mkdir -p Payload
          cp -r $BUILD_DIR/iosApp.app Payload/
          zip -r IReader_Troll.ipa Payload/

      - name: 上传 IPA 供下载
        uses: actions/upload-artifact@v4
        with:
          name: IReader-Troll-IPA
          path: IReader_Troll.ipa
