name: 编译 IReader 无签名 IPA
on:
  workflow_dispatch: # 手动触发编译

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取代码（含子模块）
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: 查看目录结构 & 安装 iOS 依赖
        run: |
          sudo gem install cocoapods
          # 先查看当前目录结构
          ls -la
          # 切换到 iOS 子目录
          cd iosApp || cd ios
          # 查看 iOS 子目录下的文件，确认项目名
          ls -la
          # 安装依赖
          pod install --repo-update

      - name: 编译无签名 IPA（适配 .xcodeproj）
        run: |
          # 仍在 iOS 子目录下执行编译，改用 .xcodeproj
          xcodebuild -project IReader.xcodeproj \
          -scheme "IReader" \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          clean build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO

      - name: 打包为 TrollStore 格式
        run: |
          # 回到项目根目录，打包编译产物
          cd ..
          mkdir -p Payload
          # 适配编译产物路径
          cp -r iosApp/build/Release-iphoneos/IReader.app Payload/ || cp -r ios/build/Release-iphoneos/IReader.app Payload/
          zip -r IReader_Troll.ipa Payload/

      - name: 上传 IPA 供下载
        uses: actions/upload-artifact@v4
        with:
          name: IReader-Troll-IPA
          path: IReader_Troll.ipa
