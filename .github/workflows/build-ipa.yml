name: 编译 IReader 无签名 IPA (Kotlin Multiplatform 官方方案)
on:
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 清理 & 编译 Kotlin 共享代码 (iosArm64)
        run: |
          chmod +x gradlew
          # 编译 KMP 共享代码，生成 iOS 框架
          ./gradlew :shared:compileKotlinIosArm64
          # 或者如果模块结构不同，尝试：
          # ./gradlew compileKotlinIosArm64

      - name: 编译 iOS App (使用 Xcode 通用命令)
        run: |
          cd iosApp
          xcodebuild clean build \
          -project iosApp.xcodeproj \
          -scheme iosApp \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          SKIP_PREVIEWS=YES \
          BUILD_LIBRARY_FOR_DISTRIBUTION=YES

      - name: 打包为 TrollStore IPA
        run: |
          mkdir -p Payload
          cp -r iosApp/build/Release-iphoneos/iosApp.app Payload/
          zip -r IReader_KMP_Troll.ipa Payload/

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: IReader-KMP-Troll-IPA
          path: IReader_KMP_Troll.ipa
